<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Raquel y Aarón</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bg-music" src="musica.mp3" loop></audio>
    
    <div id="wrapper" class="wrapper paso-1">
        
        <!-- CONTENEDOR INTEGRAL ÚNICO -->
        <div class="invitation-container">
            
            <!-- PORTADA (Paso 1: Apertura de Libro) -->
            <div class="door-layer">
                <div class="door left-door">
                    <img src="images/portada_2.PNG" alt="Portada Izquierda">
                </div>
                <div class="door right-door">
                    <img src="images/portada_2.PNG" alt="Portada Derecha">
                </div>
            </div>

            <!-- CONTENIDO PASO 2: SÓLO EL CENTRO -->
            <div class="content-view center-view">
                <img src="images/centro_2.png" alt="Mensaje de bienvenida">
            </div>

            <!-- CONTENIDO PASO 3: IZQUIERDA Y DERECHA UNIDAS (QR y Ubicaciones) -->
            <div class="content-view final-view">
                <div class="final-half">
                    <img src="images/izquierda_2.png" alt="Programa">
                    <a href="https://forms.gle/ZrDrjoPubMzjA1dF7" target="_blank" class="invisible-btn btn-qr" title="Confirmar asistencia"></a>
                </div>
                <div class="final-half">
                    <img src="images/derecha_2.png" alt="Ubicaciones">
                    <a href="https://maps.app.goo.gl/3Wf6397tMze2vfhi6" target="_blank" class="invisible-btn btn-iglesia" title="Ubicación Iglesia"></a>
                    <a href="https://maps.app.goo.gl/h2YSs8kMkYBCDjha9" target="_blank" class="invisible-btn btn-convite" title="Ubicación Convite"></a>
                </div>
            </div>

            <!-- CONTENIDO PASO 4: CIERRE (Cortinas lentas) -->
            <div class="content-view closure-view">
                <div class="curtain left-curtain">
                    <img src="images/cierre1.png" alt="Cierre Izquierda">
                </div>
                <div class="curtain right-curtain">
                    <img src="images/cierre2.png" alt="Cierre Derecha">
                </div>
            </div>

        </div>

        <!-- BOTÓN DE NAVEGACIÓN -->
        <button id="action-btn" class="main-button">Descubrid nuestra boda</button>

        <!-- NUEVO BOTÓN PARA VOLVER A EMPEZAR -->
        <button id="reset-btn" class="secondary-button">Volver a ver invitación</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
