<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Invitación de Boda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Elemento de audio para la música de fondo -->
    <audio id="bg-music" src="musica.mp3" loop></audio>

    <div id="wrapper" class="wrapper paso-1">
        
        <div class="invitation-container">
            
            <!-- PASO 1: Portada (Puertas del libro) -->
            <div id="main-doors" class="door-layer">
                <div class="door left-door">
                    <img src="images/portada_2.PNG" alt="Portada Izquierda">
                </div>
                <div class="door right-door">
                    <img src="images/portada_2.PNG" alt="Portada Derecha">
                </div>
            </div>

            <!-- PASO 2: Contenido Central (Bienvenida/Intro) -->
            <div class="content-view center-view">
                <img src="images/centro_2.PNG" alt="Contenido Principal">
            </div>

            <!-- PASO 3: Vista Final (Mapas, Iglesia, Convite y QR) -->
            <div class="content-view final-view">
                <img src="images/final_3.png" alt="Detalles y Ubicaciones">
                
                <!-- Botones invisibles sobre la imagen del paso 3 -->
                <a href="ENLACE_A_TU_IGLESIA_O_MAPA" target="_blank" class="invisible-btn btn-iglesia"></a>
                <a href="ENLACE_A_TU_CONVITE_O_MAPA" target="_blank" class="invisible-btn btn-convite"></a>
                <a href="ENLACE_A_TU_FORMULARIO_QR" target="_blank" class="invisible-btn btn-qr"></a>
            </div>

            <!-- PASO 4: Cierre de Cortinas -->
            <div class="content-view closure-view">
                <div class="curtain left-curtain">
                    <img src="images/portada_1.png" alt="Cortina Izquierda">
                </div>
                <div class="curtain right-curtain">
                    <img src="images/portada_2.png" alt="Cortina Derecha">
                </div>
            </div>

        </div>

        <!-- BOTÓN PRINCIPAL (Avanza entre los pasos 1, 2 y 3) -->
        <button id="action-btn" class="main-button">Descubrid nuestra boda</button>
        
        <!-- BOTÓN SECUNDARIO (Aparece solo en el paso 4 para regresar al contenido) -->
        <button id="reset-btn" class="secondary-button">Volver al contenido</button>

    </div>

    <script src="script.js"></script>
</body>
</html>
